name: Deploy Sentinel Content

on:
  workflow_dispatch:
    inputs:
      customerCode:
        description: Customer code folder under customers/
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CUSTOMER_FILE: customers/${{ inputs.customerCode }}/customer.json
      PLAYBOOKS_FILE: sentinelcontent/playbooks/global-playbooks.json
      WORKBOOK_FILE: sentinelcontent/workbooks/soc-performance-workbook-content.json
      WORKBOOK_BICEP: sentinelcontent/workbooks/patriot-mxdr-performance.bicep
      ANALYTIC_RULE_BICEP: sentinelcontent/analytics/MXDR365 - Keylogger detection.bicep.bicep
      HUNTING_QUERY_BICEP: sentinelcontent/hunting/MXDR365 - AI LLM File Download Activity.bicep.bicep
      AUTOMATION_RULE_BICEP: sentinelcontent/automation-rules/freshservice-incident-updates.bicep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files exist
        run: |
          test -f "$CUSTOMER_FILE"
          test -f "$PLAYBOOKS_FILE"
          test -f "$WORKBOOK_FILE"
          test -f "$WORKBOOK_BICEP"
          test -f "$AUTOMATION_RULE_BICEP"

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Load customer and global config
        id: cfg
        shell: bash
        run: |
          set -euo pipefail

          CUSTOMER_CODE=$(jq -r '.customerCode' "$CUSTOMER_FILE")
          ACTIVE=$(jq -r '.active' "$CUSTOMER_FILE")
          RG=$(jq -r '.resourceGroupName' "$CUSTOMER_FILE")
          WORKSPACE=$(jq -r '.workspace' "$CUSTOMER_FILE")
          WORKSPACE_RESOURCE_ID=$(jq -r '.workspaceResourceId' "$CUSTOMER_FILE")
          WORKBOOK_ID=$(jq -r '.workbookId' "$CUSTOMER_FILE")
          AUTOMATION_RULE_ID=$(jq -r '.automationRuleIds.freshServiceIncidentUpdates' "$CUSTOMER_FILE")

          RULE_DISPLAY_NAME=$(jq -r '.playbooks.freshServiceIncidentUpdates.automationRuleDisplayName' "$PLAYBOOKS_FILE")
          PLAYBOOK_LOGIC_APP_RESOURCE_ID=$(jq -r '.playbooks.freshServiceIncidentUpdates.playbookLogicAppResourceId' "$PLAYBOOKS_FILE")
          PLAYBOOK_TENANT_ID=$(jq -r '.playbooks.freshServiceIncidentUpdates.playbookTenantId' "$PLAYBOOKS_FILE")

          if [ "$ACTIVE" != "true" ]; then
            echo "Customer $CUSTOMER_CODE is inactive. Exiting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SERIALIZED_DATA=$(jq -c . "$WORKBOOK_FILE")

          {
            echo "skip=false"
            echo "customer_code=$CUSTOMER_CODE"
            echo "resource_group=$RG"
            echo "workspace=$WORKSPACE"
            echo "workspace_resource_id=$WORKSPACE_RESOURCE_ID"
            echo "workbook_id=$WORKBOOK_ID"
            echo "automation_rule_id=$AUTOMATION_RULE_ID"
            echo "automation_rule_display_name=$RULE_DISPLAY_NAME"
            echo "playbook_logic_app_resource_id=$PLAYBOOK_LOGIC_APP_RESOURCE_ID"
            echo "playbook_tenant_id=$PLAYBOOK_TENANT_ID"
            echo "serialized_data<<EOF"
            echo "$SERIALIZED_DATA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Show deployment target
        if: steps.cfg.outputs.skip != 'true'
        run: |
          echo "Customer: ${{ steps.cfg.outputs.customer_code }}"
          echo "Resource group: ${{ steps.cfg.outputs.resource_group }}"
          echo "Workspace: ${{ steps.cfg.outputs.workspace }}"

      - name: Deploy analytic rule
        if: steps.cfg.outputs.skip != 'true'
        run: |
          az deployment group create \
            --resource-group "${{ steps.cfg.outputs.resource_group }}" \
            --name "analytic-${{ steps.cfg.outputs.customer_code }}-${{ github.run_id }}" \
            --template-file "$ANALYTIC_RULE_BICEP" \
            --parameters workspace="${{ steps.cfg.outputs.workspace }}"

      - name: Deploy hunting query
        if: steps.cfg.outputs.skip != 'true'
        run: |
          az deployment group create \
            --resource-group "${{ steps.cfg.outputs.resource_group }}" \
            --name "hunting-${{ steps.cfg.outputs.customer_code }}-${{ github.run_id }}" \
            --template-file "$HUNTING_QUERY_BICEP" \
            --parameters workspace="${{ steps.cfg.outputs.workspace }}"

      - name: Deploy workbook
        if: steps.cfg.outputs.skip != 'true'
        run: |
          az deployment group create \
            --resource-group "${{ steps.cfg.outputs.resource_group }}" \
            --name "workbook-${{ steps.cfg.outputs.customer_code }}-${{ github.run_id }}" \
            --template-file "$WORKBOOK_BICEP" \
            --parameters \
              workbookSourceId="${{ steps.cfg.outputs.workspace_resource_id }}" \
              workbookId="${{ steps.cfg.outputs.workbook_id }}" \
              serializedData='${{ steps.cfg.outputs.serialized_data }}'

      - name: Deploy automation rule
        if: steps.cfg.outputs.skip != 'true'
        run: |
          az deployment group create \
            --resource-group "${{ steps.cfg.outputs.resource_group }}" \
            --name "automation-${{ steps.cfg.outputs.customer_code }}-${{ github.run_id }}" \
            --template-file "$AUTOMATION_RULE_BICEP" \
            --parameters \
              workspace="${{ steps.cfg.outputs.workspace }}" \
              automationRuleId="${{ steps.cfg.outputs.automation_rule_id }}" \
              automationRuleDisplayName="${{ steps.cfg.outputs.automation_rule_display_name }}" \
              playbookLogicAppResourceId="${{ steps.cfg.outputs.playbook_logic_app_resource_id }}" \
              playbookTenantId="${{ steps.cfg.outputs.playbook_tenant_id }}"
